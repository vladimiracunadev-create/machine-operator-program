version: 2
updates:
  # Mantiene vivas las acciones pineadas a SHA: abre un PR semanal cuando hay
  # una version nueva, actualizando el SHA y su comentario de version.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
