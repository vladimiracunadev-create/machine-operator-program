name: Validar documentacion

# Valida en cada cambio que el repositorio documental sigue integro:
# estructura de vehiculos y secciones, enlaces internos resueltos y estilo de
# Markdown consistente. Todos los jobs deben quedar en verde.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  estructura:
    name: Estructura y enlaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configurar Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Validar estructura y enlaces internos
        run: python scripts/validar_estructura.py

      - name: Resumen
        if: always()
        run: |
          {
            echo "### Multisimulador de mandos"
            echo ""
            echo "- Vehiculos: **$(find vehiculos -mindepth 1 -maxdepth 1 -type d | wc -l)**"
            echo "- Documentos Markdown: **$(find . -name '*.md' -not -path './node_modules/*' | wc -l)**"
          } >> "$GITHUB_STEP_SUMMARY"

  markdown:
    name: Estilo de Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configurar Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      # Se usa pnpm en lugar de npm para reducir superficie ante ataques de
      # cadena de suministro (postinstall bloqueado + minimumReleaseAge).
      - name: Instalar pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11

      - name: Instalar markdownlint-cli2
        run: pnpm add -g markdownlint-cli2

      - name: Lint de Markdown
        run: markdownlint-cli2 "**/*.md"
